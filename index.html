---
layout: default
published: true
---
<em>Powered by</em>
<img src="images/logo-2x.png" style="max-width:25%;" alt="JekyllLogo">

<small>A simple JavaScript blog with short explanations and examples of JS fundamentals.</small>


<div class="posts">
  {% for post in site.posts %}
    <article class="post">

      <h1><a href="{{ site.baseurl }}{{ post.url }}">{{ post.title }}</a></h1>

      <div class="entry">
        {{ post.excerpt }}
      </div>
     

      <a href="{{ site.baseurl }}{{ post.url }}" class="read-more">Read More</a>
    </article>
  {% endfor %}
</div>
